name: Dev

on:
  workflow_dispatch:

env:
  IMAGE_NAME: "realtime-map"
  DOCKERFILE_PATH: "Dockerfile"

  DEPLOYMENT_FILE_PATH: ".k8s/dev.yaml"
  DEPLOYMENT_NAME: "dev-realtime-map"
  KUBE_NAMESPACE: "dev-realtime-map"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Private Docker Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY }}
          username: json_key
          password: ${{ secrets.REGISTRY_KEY }}

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ secrets.REGISTRY }}
        run: |
          TAG=$(echo $GITHUB_RUN_ID)
          docker buildx build --push --tag $REGISTRY/$IMAGE_NAME:$TAG --file $(echo $DOCKERFILE_PATH) .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v3

      - name: Update deployment file
        env:
          REGISTRY: ${{ secrets.REGISTRY }}
        run: TAG=$(echo $GITHUB_RUN_ID) && sed -i 's|<IMAGE>|'$REGISTRY'/'$(echo $IMAGE_NAME)':'${TAG}'|' $(echo $DEPLOYMENT_FILE_PATH)

      - name: Set up kubectl
        env:
          KUBE_URL: ${{ secrets.KUBE_URL }}
          KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
        run: |
          kubectl config set-cluster k8s --server="$KUBE_URL" --insecure-skip-tls-verify=true
          kubectl config set-credentials admin --token="$KUBE_TOKEN"
          kubectl config set-context default --cluster=k8s --user=admin
          kubectl config use-context default

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f $(echo $DEPLOYMENT_FILE_PATH) -n $KUBE_NAMESPACE

      - name: Verify deployment
        run: kubectl rollout status deployment/$(echo $DEPLOYMENT_NAME) -n $KUBE_NAMESPACE